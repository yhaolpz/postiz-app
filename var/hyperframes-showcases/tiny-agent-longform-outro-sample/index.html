<!doctype html>
<html lang="en-US" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Tiny Agent long-form outro sample</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --paper: #ECECEA;
        --ink: #111413;
        --blue: #117ABD;
        --line: #C9CBC5;
      }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--paper);
      }
      body {
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
      }
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #outro-scene {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      .paper-layer {
        position: absolute;
        inset: 0;
        background: var(--paper);
      }
      #outro-character {
        position: absolute;
        inset: 0;
        display: block;
        width: 1920px;
        height: 1080px;
        object-fit: cover;
      }
      #outro-copy {
        position: absolute;
        top: 214px;
        right: 82px;
        z-index: 4;
        width: 850px;
        min-height: 660px;
        padding: 52px 40px 48px 54px;
      }
      .follow-row {
        display: flex;
        align-items: center;
        gap: 28px;
      }
      #follow-mark {
        position: relative;
        display: block;
        flex: 0 0 82px;
        width: 82px;
        height: 82px;
        border: 8px solid var(--blue);
        border-radius: 50%;
      }
      #follow-mark::before,
      #follow-mark::after {
        position: absolute;
        top: 50%;
        left: 50%;
        display: block;
        width: 38px;
        height: 8px;
        border-radius: 5px;
        background: var(--blue);
        content: "";
        transform: translate(-50%, -50%);
      }
      #follow-mark::after { transform: translate(-50%, -50%) rotate(90deg); }
      #outro-heading {
        color: var(--blue);
        font-size: 78px;
        font-weight: 900;
        line-height: 1.02;
        letter-spacing: -2px;
      }
      .copy-rule {
        display: block;
        width: 100%;
        height: 5px;
        margin: 44px 0 42px;
        background: var(--line);
      }
      #outro-benefit {
        max-width: 790px;
        font-size: 68px;
        font-weight: 900;
        line-height: 1.13;
        letter-spacing: -1.8px;
      }
      #outro-benefit span { display: block; }
      #benefit-underline {
        display: block;
        width: 728px;
        height: 12px;
        margin-top: 36px;
        border-radius: 8px;
        background: var(--blue);
        transform-origin: left center;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5.22"
    >
      <audio
        id="outro-narration"
        class="clip"
        src="assets/audio/outro-narration.mp3"
        data-start="0"
        data-duration="4.992"
        data-track-index="10"
        data-volume="1"
      ></audio>

      <section
        id="outro-scene"
        class="clip"
        data-start="0"
        data-duration="5.22"
        data-track-index="1"
      >
        <div class="paper-layer" aria-hidden="true"></div>
        <img
          id="outro-character"
          src="assets/images/tiny-agent-outro-key-art-papergray.png"
          alt="A smiling Tiny Agent waves goodbye"
        />
        <div id="outro-copy">
          <div class="follow-row">
            <span id="follow-mark" aria-hidden="true"></span>
            <h1 id="outro-heading">Follow Tiny Agent</h1>
          </div>
          <span class="copy-rule" aria-hidden="true"></span>
          <p id="outro-benefit">
            <span>Tiny Agent helps you</span>
            <span>get better at using AI.</span>
          </p>
          <span id="benefit-underline" aria-hidden="true"></span>
        </div>
      </section>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.set("#benefit-underline", { scaleX: 0 }, 0);
      tl.to("#follow-mark", { scale: 1.08, duration: 0.28, ease: "power2.out" }, 0.10);
      tl.to("#follow-mark", { scale: 1, duration: 0.32, ease: "power2.inOut" }, 0.38);
      tl.to("#benefit-underline", { scaleX: 1, duration: 0.62, ease: "power3.out" }, 1.884);
      tl.to("#follow-mark", { scale: 1.06, duration: 0.26, ease: "power2.out" }, 3.08);
      tl.to("#follow-mark", { scale: 1, duration: 0.30, ease: "power2.inOut" }, 3.34);
      tl.to("#benefit-underline", { opacity: 0.72, duration: 0.24, ease: "sine.inOut" }, 4.36);
      tl.to("#benefit-underline", { opacity: 1, duration: 0.24, ease: "sine.inOut" }, 4.61);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
